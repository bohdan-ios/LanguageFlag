name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive
        run: |
          xcodebuild archive \
            -project LanguageFlag.xcodeproj \
            -scheme LanguageFlag \
            -configuration Release \
            -archivePath build/LanguageFlag.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Copy .app
        run: |
          cp -R \
            build/LanguageFlag.xcarchive/Products/Applications/LanguageFlag.app \
            build/LanguageFlag.app

      - name: Zip
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ditto -c -k --keepParent \
            build/LanguageFlag.app \
            "build/LanguageFlag-${VERSION}.zip"
          echo "ZIP_PATH=build/LanguageFlag-${VERSION}.zip" >> "$GITHUB_ENV"

      - name: Create Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "$ZIP_PATH" \
            --title "LanguageFlag $GITHUB_REF_NAME" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 "$ZIP_PATH" | awk '{print $1}')

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/bohdan-ios/homebrew-languageflag.git tap
          cd tap

          sed -i '' "s/version \".*\"/version \"${VERSION}\"/" Casks/languageflag.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA256}\"/" Casks/languageflag.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/languageflag.rb
          git commit -m "Update languageflag to ${VERSION}"
          git push
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
